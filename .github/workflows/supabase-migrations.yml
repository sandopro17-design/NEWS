# Applica le migrazioni in supabase/migrations/*.sql sul progetto Supabase hosted.
# Pattern ufficiale Supabase (IPv6-safe su Actions: niente connection string diretta al DB):
# https://supabase.com/docs/guides/cli/managing-environments
#
# Secret richiesti:
# - SUPABASE_ACCESS_TOKEN (Account → Access Tokens)
# - SUPABASE_DB_PASSWORD (password utente postgres del progetto)
#
# Dopo run verde: lanciare manualmente "RSS Poller Readiness".

name: Supabase migrations

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-migrations
  cancel-in-progress: true

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
  SUPABASE_PROJECT_ID: ktyrxriahgqcrxmjwyxq

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "::error::Aggiungere secret SUPABASE_ACCESS_TOKEN (Supabase → Account → Access Tokens)." && exit 1)
          test -n "$SUPABASE_DB_PASSWORD" || (echo "::error::Aggiungere secret SUPABASE_DB_PASSWORD (password database progetto TrueFlow)." && exit 1)

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD" --yes

      - name: Push migrations
        run: supabase db push --yes

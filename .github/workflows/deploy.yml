# Deploy static build to GitHub Pages (Vite + React; base path /NEWS/).
# Impostare in repo Settings → Pages → Source: GitHub Actions.
# Se deploy-pages fallisce con 404 "Creating Pages deployment failed": verificare che Pages sia
# abilitato (stesso URL settings) e l'environment `github-pages` non sia bloccato al primo run.
#
# Due repository (stesso codice): `sandopro17-design/NEWS` (canonico Pages) vs `sandopro17-design/trueflow`.
# Per evitare job rossi su trueflow senza Pages abilitato:
# - build: sempre (artifact + validazione).
# - deploy + smoke_hosted: solo se repo è NEWS oppure variable ENABLE_GH_PAGES=true (opt-in).
# Opzionale: vars.HOSTED_PAGES_URL per smoke (default sotto nello step).
# Secrets: VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require Vite Supabase secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::Impostare i repository secrets VITE_SUPABASE_URL e VITE_SUPABASE_ANON_KEY (Settings → Secrets and variables → Actions)."
            exit 1
          fi

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Upload Pages artifact
        if: github.repository == 'sandopro17-design/NEWS' || vars.ENABLE_GH_PAGES == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: github.repository == 'sandopro17-design/NEWS' || vars.ENABLE_GH_PAGES == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  smoke_hosted:
    needs: deploy
    if: github.repository == 'sandopro17-design/NEWS' || vars.ENABLE_GH_PAGES == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Hosted smoke (Pages + search-ai)
        env:
          HOSTED_PAGES_URL: ${{ vars.HOSTED_PAGES_URL }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SMOKE_SEARCH_AI_MAX_ATTEMPTS: '4'
          SMOKE_SEARCH_AI_RETRY_MS: '20000'
        run: |
          set -e
          if [ -z "${HOSTED_PAGES_URL:-}" ]; then
            owner="${GITHUB_REPOSITORY%%/*}"
            repo="${GITHUB_REPOSITORY#*/}"
            export HOSTED_PAGES_URL="https://${owner}.github.io/${repo}"
          fi
          npm run smoke:hosted
